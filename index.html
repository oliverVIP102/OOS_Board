<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory & OOS Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#F4F5F7;color:#333;padding:0}
.topbar{background:#2D3E50;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{color:#fff;font-size:16px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.topbar-sub{color:#4AADA8;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.subbar{background:#3a4f63;padding:8px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:1.5rem}
.upload-btn{cursor:pointer;padding:6px 16px;border:1.5px solid #4AADA8;border-radius:4px;font-size:12px;font-weight:700;color:#4AADA8;background:transparent;letter-spacing:0.03em}
.upload-btn:hover{background:#4AADA8;color:#fff}
#fileInfo{font-size:12px;color:#aac4d0}
.wrap{padding:0 24px 24px}
.section-label{font-size:11px;font-weight:700;color:#2D3E50;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.controls{background:#fff;border:1px solid #DDD;border-radius:4px;padding:14px 16px;margin-bottom:1.5rem;display:none}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.row label{font-size:12px;font-weight:700;color:#2D3E50}
select{padding:5px 10px;font-size:12px;border-radius:4px;border:1px solid #CCC;background:#fff;color:#333}
select:focus{outline:none;border-color:#4AADA8}
.unit-group{display:flex;border:1px solid #CCC;border-radius:4px;overflow:hidden}
.unit-btn{padding:6px 16px;font-size:12px;border:none;border-right:1px solid #CCC;background:#fff;color:#555;cursor:pointer;font-weight:500}
.unit-btn:last-child{border-right:none}
.unit-btn:hover{background:#f0f0f0}
.unit-btn.active{background:#4AADA8;color:#fff;font-weight:700}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.mcard{background:#fff;border:1px solid #DDD;border-top:3px solid #4AADA8;border-radius:4px;padding:14px 16px}
.mcard .lbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.mcard .val{font-size:22px;font-weight:500;color:#2D3E50}
.mcard .sub{font-size:11px;color:#aaa;margin-top:4px}
.charts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-bottom:1.5rem}
.cbox{background:#fff;border:1px solid #DDD;border-radius:4px;padding:16px}
.cbox.full{grid-column:1/-1}
.ctitle{font-size:11px;font-weight:700;color:#2D3E50;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:11px;color:#666}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
.tbox{background:#fff;border:1px solid #DDD;border-radius:4px;padding:16px;overflow-x:auto;margin-bottom:1rem}
.tbox-title{font-size:11px;font-weight:700;color:#2D3E50;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #4AADA8;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:right;padding:9px 12px;background:#2D3E50;color:#fff;font-weight:600;font-size:11px;white-space:nowrap;letter-spacing:0.03em}
th.l,td.l{text-align:left}
td{padding:9px 12px;border-bottom:1px solid #EEE;color:#333;text-align:right;white-space:nowrap}
tr:hover td{background:#F0FAF9}
tr:last-child td{border-bottom:none}
.neg{color:#c0392b;font-weight:600}
.whdr td{background:#EAF6F5;font-size:11px;font-weight:700;color:#2D3E50;border-top:2px solid #4AADA8;text-transform:uppercase;letter-spacing:0.05em}
.whdr.first td{border-top:none}
#noOOS{text-align:center;padding:2rem;font-size:13px;color:#aaa;display:none}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Inventory &amp; OOS Dashboard</div>
    <div class="topbar-sub">Weekly Performance Overview</div>
  </div>
</div>

<div class="subbar">
  <label class="upload-btn" for="csvIn">&#8593; Upload CSV</label>
  <input type="file" id="csvIn" accept=".csv" style="display:none">
  <span id="fileInfo">No file loaded — upload a CSV to begin</span>
</div>

<div class="wrap">
  <div class="controls" id="controls">
    <div class="section-label">Filters &amp; Units</div>
    <div class="row">
      <label>Unit:</label>
      <div class="unit-group">
        <button class="unit-btn active" id="btnCE">Case Equivalent (CE)</button>
        <button class="unit-btn" id="btn9L">9-Liter Equivalent (9L)</button>
        <button class="unit-btn" id="btnUN">Individual Units</button>
      </div>
    </div>
    <div class="row">
      <label>Brand:</label>
      <select id="fBrand"><option value="">All brands</option></select>
      <label>Distributor:</label>
      <select id="fDist"><option value="">All distributors</option></select>
      <label>Item:</label>
      <select id="fItem"><option value="">All items</option></select>
    </div>
  </div>

  <div id="metrics" class="metrics" style="display:none"></div>

  <div id="chartsArea" style="display:none">
    <div class="charts">
      <div class="cbox">
        <div class="ctitle" id="tROS"></div>
        <div class="legend"><span><i style="background:#2D3E50"></i><span id="lROS"></span></span></div>
        <div style="position:relative;width:100%;height:220px"><canvas id="cROS" role="img" aria-label="Forecasted rate of sale line chart"></canvas></div>
      </div>
      <div class="cbox">
        <div class="ctitle" id="tINB"></div>
        <div class="legend"><span><i style="background:#4AADA8"></i><span id="lINB"></span></span></div>
        <div style="position:relative;width:100%;height:220px"><canvas id="cINB" role="img" aria-label="Shipping to dist bar chart"></canvas></div>
      </div>
      <div class="cbox full">
        <div class="ctitle" id="tINV"></div>
        <div class="legend">
          <span><i style="background:#2D3E50"></i>On-hand inventory</span>
          <span><i style="background:#4AADA8"></i>Inbound</span>
          <span><i style="background:#E67E22"></i>ROS depletion</span>
        </div>
        <div style="position:relative;width:100%;height:260px"><canvas id="cINV" role="img" aria-label="Projected inventory line chart"></canvas></div>
      </div>
    </div>

    <div class="tbox">
      <div class="tbox-title">Out Of Stock Highlights By Week</div>
      <div id="noOOS">No OOS events detected for the selected filters.</div>
      <table id="oosTable" style="display:none">
        <thead><tr>
          <th class="l">Item</th><th class="l">Brand</th><th class="l">Distributor</th>
          <th id="hInv">Inventory</th><th id="hRos">ROS</th><th id="hShort">Shortage</th><th>Next Inbound Order</th>
        </tr></thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</body>
</html>
<script>
var UNITS={CE:{label:'CE',div:288},NL:{label:'9L',div:304.326},UN:{label:'Units',div:null}};
var unitKey='CE',allRows=[],weeks=[],chartObjs={};

function splitLine(line){
  var cols=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=ch;
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text){
  var lines=text.trim().split('\n'),headers=splitLine(lines[0]);
  return lines.slice(1).map(function(line){
    var cols=splitLine(line),obj={};
    headers.forEach(function(h,i){obj[h]=cols[i]||'';});
    return obj;
  }).filter(function(r){return Object.keys(r).length>2;});
}

function detectWeeks(headers){
  var seen={};
  headers.forEach(function(h){var m=h.match(/^W(\d+)\s/i);if(m)seen[parseInt(m[1])]=1;});
  return Object.keys(seen).map(Number).sort(function(a,b){return a-b;});
}

function num(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function conv(units,oz){return unitKey==='UN'?num(units):(num(units)*num(oz))/UNITS[unitKey].div;}
function ul(){return UNITS[unitKey].label;}
function fmt(v){return unitKey==='UN'?Math.round(v).toLocaleString():v.toFixed(2);}
function fnum(v){return parseFloat(String(fmt(v)).replace(/,/g,''));}

function populateSel(id,rows,valFn,labelFn){
  var sel=document.getElementById(id);
  while(sel.options.length>1)sel.remove(1);
  var map={};
  rows.forEach(function(r){var v=valFn(r);if(v&&!map[v])map[v]=labelFn?labelFn(r):v;});
  Object.keys(map).sort().forEach(function(v){
    var o=document.createElement('option');
    o.value=v;o.textContent=labelFn?v+' \u2014 '+map[v]:v;
    sel.appendChild(o);
  });
}

function getFiltered(){
  var b=document.getElementById('fBrand').value;
  var d=document.getElementById('fDist').value;
  var it=document.getElementById('fItem').value;
  return allRows.filter(function(r){
    return(!b||r['brand']===b)&&(!d||r['Distributor']===d)&&(!it||r['SupplierItem']===it);
  });
}

function killChart(id){if(chartObjs[id]){chartObjs[id].destroy();delete chartObjs[id];}}

function render(){
  var rows=getFiltered();
  if(!rows.length)return;
  var u=ul(),wl=weeks.map(function(w){return'W'+w;}),gc='rgba(0,0,0,0.05)',tc='#999';

  var ohCE=rows.reduce(function(s,r){return s+conv(r['On-Hand Begin'],r['oz']);},0);
  var ros=weeks.map(function(w){return rows.reduce(function(s,r){return s+conv(r['W'+w+' ros'],r['oz']);},0);});
  var inb=weeks.map(function(w){return rows.reduce(function(s,r){return s+conv(r['W'+w+' inbound'],r['oz']);},0);});
  var invCur=ohCE;
  var inv=weeks.map(function(w,i){invCur=Math.max(0,invCur+inb[i]-ros[i]);return invCur;});

  var oos=[];
  rows.forEach(function(r){
    var ri=conv(r['On-Hand Begin'],r['oz']);
    weeks.forEach(function(w){
      var wR=conv(r['W'+w+' ros'],r['oz']),wI=conv(r['W'+w+' inbound'],r['oz']);
      var avail=Math.max(0,ri)+wI; // inventory can't go below 0 before adding inbound
      var shortage=wR-avail;
      ri=avail-wR; // carry forward (may go negative, clamped next iteration)
      if(shortage>0)oos.push({week:w,item:r['SupplierItem']||'\u2014',brand:r['brand']||'\u2014',dist:r['Distributor']||'\u2014',avail:avail,ros:wR,shortage:shortage,rawRow:r});
    });
  });

  var oosWkNums=oos.reduce(function(acc,e){acc[e.week]=1;return acc;},{});
  var sortedOOSWks=Object.keys(oosWkNums).map(Number).sort(function(a,b){return a-b;});
  var fw=sortedOOSWks.length?sortedOOSWks[0]:null;
  var firstWkIdx=fw!==null?weeks.indexOf(fw):-1;
  var firstWkROS=firstWkIdx>=0?ros[firstWkIdx]:0;
  var firstWkInb=firstWkIdx>=0?inb[firstWkIdx]:0;
  var curOOS=fw!==null?oos.filter(function(e){return e.week===fw;}).reduce(function(s,e){return s+e.shortage;},0):0;
  var oosPct=firstWkROS>0?(curOOS/firstWkROS)*100:0;

  document.getElementById('metrics').style.display='grid';
  document.getElementById('metrics').innerHTML=
    '<div class="mcard"><div class="lbl">Distributor Inventory</div><div class="val">'+Math.round(ohCE)+' '+u+'</div><div class="sub">On-hand begin</div></div>'+
    '<div class="mcard"><div class="lbl">Total Distributor Shipments</div><div class="val">'+Math.round(firstWkInb)+' '+u+'</div><div class="sub">'+(fw!==null?'W'+fw:'No OOS week')+'</div></div>'+
    '<div class="mcard"><div class="lbl">OOS %</div><div class="val" style="color:#c0392b">'+(fw!==null?oosPct.toFixed(1)+'%':'N/A')+'</div><div class="sub">'+(fw!==null?'OOS \u00f7 ROS in W'+fw:'No OOS detected')+'</div></div>'+
    '<div class="mcard"><div class="lbl">Current Week OOS</div><div class="val" style="color:#c0392b">'+(fw!==null?fmt(curOOS)+' '+u:'None')+'</div><div class="sub">'+(fw!==null?'Total shortage W'+fw:'No OOS detected')+'</div></div>';

  document.getElementById('tROS').textContent='Forecasted Rate of Sale by Week ('+u+')';
  document.getElementById('tINB').textContent='Shipping to Dist by Week ('+u+')';
  document.getElementById('tINV').textContent='Projected Inventory Over Time ('+u+')';
  document.getElementById('lROS').textContent='ROS ('+u+'/wk)';
  document.getElementById('lINB').textContent='Shipping to Dist ('+u+')';
  document.getElementById('hInv').textContent='Inventory ('+u+')';
  document.getElementById('hRos').textContent='ROS ('+u+')';
  document.getElementById('hShort').textContent='Shortage ('+u+')';

  var tickCb=function(v){return v+' '+u;};

  var rosMin=Math.min.apply(null,ros.map(fnum));
  var rosMax=Math.max.apply(null,ros.map(fnum));
  var rosPad=(rosMax-rosMin)*1.5||rosMax*1.5||1;

  killChart('ros');
  chartObjs['ros']=new Chart(document.getElementById('cROS'),{
    type:'line',data:{labels:wl,datasets:[{label:'ROS',data:ros.map(fnum),borderColor:'#2D3E50',backgroundColor:'rgba(45,62,80,0.07)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#2D3E50',tension:0.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:tc,font:{size:11}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11},callback:tickCb},grid:{color:gc},min:Math.max(0,Math.floor(rosMin-rosPad)),max:Math.ceil(rosMax+rosPad)}}}
  });

  killChart('inb');
  chartObjs['inb']=new Chart(document.getElementById('cINB'),{
    type:'bar',data:{labels:wl,datasets:[{label:'Shipping to Dist',data:inb.map(fnum),backgroundColor:'#4AADA8',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:tc,font:{size:11}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11},callback:tickCb},grid:{color:gc},min:0}}}
  });

  killChart('inv');
  chartObjs['inv']=new Chart(document.getElementById('cINV'),{
    type:'line',
    data:{labels:['Start'].concat(wl),datasets:[
      {label:'On-hand',data:[fnum(ohCE)].concat(inv.map(fnum)),borderColor:'#2D3E50',backgroundColor:'rgba(45,62,80,0.07)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#2D3E50',tension:0.3,fill:true},
      {label:'Inbound',data:[null].concat(inb.map(fnum)),borderColor:'#4AADA8',backgroundColor:'transparent',borderWidth:2,borderDash:[4,3],pointRadius:3,pointBackgroundColor:'#4AADA8',tension:0.3},
      {label:'ROS',data:[null].concat(ros.map(fnum)),borderColor:'#E67E22',backgroundColor:'transparent',borderWidth:2,borderDash:[4,3],pointRadius:3,pointBackgroundColor:'#E67E22',tension:0.3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:tc,font:{size:11}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11},callback:tickCb},grid:{color:gc},min:0}}}
  });

  var noOOS=document.getElementById('noOOS');
  var oosTable=document.getElementById('oosTable');
  if(!oos.length){
    noOOS.style.display='block';oosTable.style.display='none';
    document.getElementById('tBody').innerHTML='';return;
  }
  noOOS.style.display='none';oosTable.style.display='table';

  var byWeek={};
  oos.sort(function(a,b){return a.week-b.week||b.shortage-a.shortage;}).forEach(function(e){
    if(!byWeek[e.week])byWeek[e.week]=[];
    if(byWeek[e.week].length<5)byWeek[e.week].push(e);
  });

  document.getElementById('tBody').innerHTML=sortedOOSWks.map(function(w,wi){
    var top5=byWeek[w];
    var allEvts=oos.filter(function(e){return e.week===w;});
    var trueTotal=allEvts.reduce(function(s,e){return s+e.shortage;},0);
    var hcls=wi===0?'whdr first':'whdr';
    return '<tr class="'+hcls+'"><td class="l" colspan="7" style="padding:10px 12px">W'+w+' \u2014 Top '+top5.length+' OOS Events</td></tr>'+
      top5.map(function(e){
        var nextWk=null,nextQty=0;
        for(var i=weeks.indexOf(e.week);i<weeks.length;i++){
          var chkW=weeks[i],chkQty=conv(e.rawRow['W'+chkW+' inbound'],e.rawRow['oz']);
          if(chkQty>0){nextWk=chkW;nextQty=chkQty;break;}
        }
        var badge=nextWk!==null
          ?'<span style="background:#e6f4f1;color:#0F6E56;border:1px solid #1D9E75;border-radius:3px;padding:2px 8px;font-size:10px;font-weight:700">W'+nextWk+' \u2014 '+Math.round(nextQty)+' '+u+'</span>'
          :'<span style="background:#fdf0ee;color:#993C1D;border:1px solid #D85A30;border-radius:3px;padding:2px 8px;font-size:10px;font-weight:700">None</span>';
        return '<tr><td class="l">'+e.item+'</td><td class="l">'+e.brand+'</td><td class="l">'+e.dist+'</td>'+
               '<td>'+fmt(e.avail)+' '+u+'</td><td>'+fmt(e.ros)+' '+u+'</td>'+
               '<td class="neg">'+fmt(e.shortage)+' '+u+'</td><td>'+badge+'</td></tr>';
      }).join('')+
      '<tr style="background:#f7fdfc;border-top:1.5px solid #4AADA8">'+
        '<td class="l" colspan="3" style="font-weight:700;color:#2D3E50;font-size:11px;text-transform:uppercase;letter-spacing:0.04em">Total</td>'+
        '<td colspan="3"></td>'+
        '<td style="font-weight:700;color:#c0392b">'+fmt(trueTotal)+' '+u+'</td>'+
      '</tr>';
  }).join('');
}

var btns={CE:document.getElementById('btnCE'),NL:document.getElementById('btn9L'),UN:document.getElementById('btnUN')};
Object.keys(btns).forEach(function(k){
  btns[k].addEventListener('click',function(){
    unitKey=k;
    Object.keys(btns).forEach(function(b){btns[b].classList.toggle('active',b===k);});
    if(allRows.length)render();
  });
});

['fBrand','fDist','fItem'].forEach(function(id){
  document.getElementById(id).addEventListener('change',render);
});

document.getElementById('csvIn').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    allRows=parseCSV(ev.target.result);
    if(!allRows.length){document.getElementById('fileInfo').textContent='Could not parse CSV.';return;}
    weeks=detectWeeks(Object.keys(allRows[0]));
    if(!weeks.length){document.getElementById('fileInfo').textContent='No weekly columns found (expected W## ros / W## inbound).';return;}
    document.getElementById('fileInfo').textContent='Loaded '+allRows.length+' rows \u00b7 W'+weeks[0]+'\u2013W'+weeks[weeks.length-1];
    populateSel('fBrand',allRows,function(r){return r['brand'];});
    populateSel('fDist', allRows,function(r){return r['Distributor'];});
    populateSel('fItem', allRows,function(r){return r['SupplierItem'];},function(r){return(r['brand']+' '+r['size']).trim();});
    document.getElementById('controls').style.display='block';
    document.getElementById('metrics').style.display='grid';
    document.getElementById('chartsArea').style.display='block';
    render();
  };
  reader.readAsText(file);
});
</script>
</body>
</html>
