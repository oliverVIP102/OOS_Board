<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory & OOS Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#F4F5F7;color:#333}
.topbar{background:#2D3E50;padding:14px 24px}
.topbar-title{color:#fff;font-size:16px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.topbar-sub{color:#4AADA8;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.subbar{background:#3a4f63;padding:8px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:1.5rem}
.upload-btn{cursor:pointer;padding:6px 16px;border:1.5px solid #4AADA8;border-radius:4px;font-size:12px;font-weight:700;color:#4AADA8;background:transparent}
.upload-btn:hover{background:#4AADA8;color:#fff}
#fileInfo{font-size:12px;color:#aac4d0}
.wrap{padding:0 24px 24px}
.controls{background:#fff;border:1px solid #DDD;border-radius:4px;padding:14px 16px;margin-bottom:1.5rem}
.filter-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.filter-row:last-child{margin-bottom:0}
.filter-row label{font-size:12px;font-weight:700;color:#2D3E50}
.filter-row select{padding:5px 10px;font-size:12px;border-radius:4px;border:1px solid #CCC;background:#fff;color:#333;min-width:160px}
.unit-group{display:flex;border:1px solid #CCC;border-radius:4px;overflow:hidden}
.unit-btn{padding:6px 16px;font-size:12px;border:none;border-right:1px solid #CCC;background:#fff;color:#555;cursor:pointer;font-weight:500}
.unit-btn:last-child{border-right:none}
.unit-btn:hover{background:#f0f0f0}
.unit-btn.active{background:#4AADA8;color:#fff;font-weight:700}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.mcard{background:#fff;border:1px solid #DDD;border-top:3px solid #4AADA8;border-radius:4px;padding:14px 16px}
.mcard .lbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.mcard .val{font-size:22px;font-weight:500;color:#2D3E50}
.mcard .sub{font-size:11px;color:#aaa;margin-top:4px}
.charts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-bottom:1.5rem}
.cbox{background:#fff;border:1px solid #DDD;border-radius:4px;padding:16px}
.cbox.full{grid-column:1/-1}
.ctitle{font-size:11px;font-weight:700;color:#2D3E50;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:11px;color:#666}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
.tbox{background:#fff;border:1px solid #DDD;border-radius:4px;padding:16px;overflow-x:auto;margin-bottom:1rem}
.tbox-title{font-size:11px;font-weight:700;color:#2D3E50;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #4AADA8;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:right;padding:9px 12px;background:#2D3E50;color:#fff;font-weight:600;font-size:11px;white-space:nowrap;letter-spacing:0.03em}
th.l,td.l{text-align:left}
td{padding:9px 12px;border-bottom:1px solid #EEE;color:#333;text-align:right;white-space:nowrap}
tr:hover td{background:#F0FAF9}
tr:last-child td{border-bottom:none}
.neg{color:#c0392b;font-weight:600}
.whdr td{background:#EAF6F5;font-size:11px;font-weight:700;color:#2D3E50;border-top:2px solid #4AADA8;text-transform:uppercase;letter-spacing:0.05em}
.whdr.first td{border-top:none}
.nooos{text-align:center;padding:2rem;font-size:13px;color:#aaa}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Inventory &amp; OOS Dashboard</div>
  <div class="topbar-sub">Weekly Performance Overview</div>
</div>

<div class="subbar">
  <label class="upload-btn" for="csvIn">&#8593; Upload CSV</label>
  <input type="file" id="csvIn" accept=".csv" style="display:none">
  <span id="fileInfo">No file loaded — upload a CSV to begin</span>
</div>

<div class="wrap">
  <div id="controls" class="controls" style="display:none">
    <div class="filter-row">
      <label>Unit:</label>
      <div class="unit-group">
        <button class="unit-btn active" id="btnCE" onclick="setUnit('CE')">Case Equivalent (CE)</button>
        <button class="unit-btn" id="btnNL" onclick="setUnit('NL')">9-Liter Equivalent (9L)</button>
        <button class="unit-btn" id="btnUN" onclick="setUnit('UN')">Individual Units</button>
      </div>
    </div>
    <div class="filter-row">
      <label>Brand:</label>
      <select id="fBrand" onchange="onBrandChange()"><option value="">All brands</option></select>
      <label>Distributor:</label>
      <select id="fDist" onchange="onDistChange()"><option value="">All distributors</option></select>
      <label>Item:</label>
      <select id="fItem" onchange="render()"><option value="">All items</option></select>
    </div>
  </div>

  <div id="metrics" class="metrics" style="display:none"></div>

  <div id="chartsArea" style="display:none">
    <div class="charts">
      <div class="cbox">
        <div class="ctitle" id="tROS"></div>
        <div class="legend"><span><i style="background:#2D3E50"></i><span id="lROS"></span></span></div>
        <div style="position:relative;width:100%;height:220px"><canvas id="cROS"></canvas></div>
      </div>
      <div class="cbox">
        <div class="ctitle" id="tINB"></div>
        <div class="legend"><span><i style="background:#4AADA8"></i><span id="lINB"></span></span></div>
        <div style="position:relative;width:100%;height:220px"><canvas id="cINB"></canvas></div>
      </div>
      <div class="cbox full">
        <div class="ctitle" id="tINV"></div>
        <div class="legend">
          <span><i style="background:#2D3E50"></i>On-hand inventory</span>
          <span><i style="background:#4AADA8"></i>Inbound</span>
          <span><i style="background:#E67E22"></i>ROS depletion</span>
        </div>
        <div style="position:relative;width:100%;height:260px"><canvas id="cINV"></canvas></div>
      </div>
    </div>
    <div class="tbox">
      <div class="tbox-title">Out Of Stock Highlights By Week</div>
      <div id="oosBody"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
var allRows = [];
var weeks   = [];
var unitKey = 'CE';
var charts  = {};
var UNITS   = { CE:{label:'CE',div:288}, NL:{label:'9L',div:304.326}, UN:{label:'Units',div:null} };

function num(v){ var x=parseFloat(v); return isNaN(x)?0:x; }
function toVal(units,oz){ if(unitKey==='UN') return num(units); return (num(units)*num(oz))/UNITS[unitKey].div; }
function ul(){ return UNITS[unitKey].label; }
function fmt(v){ if(unitKey==='UN') return Math.round(v).toLocaleString(); return v.toFixed(2); }
function fnum(v){ return parseFloat(String(fmt(v)).replace(/,/g,'')); }

function setUnit(k){
  unitKey=k;
  var ids=['btnCE','btnNL','btnUN'];
  var keys=['CE','NL','UN'];
  for(var i=0;i<ids.length;i++){
    var el=document.getElementById(ids[i]);
    if(el){ if(keys[i]===k) el.className='unit-btn active'; else el.className='unit-btn'; }
  }
  if(allRows.length) render();
}

function splitLine(line){
  var cols=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
    else if(ch===','&&!inQ){ cols.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text){
  var lines=text.trim().split('\n');
  var headers=splitLine(lines[0]);
  for(var i=0;i<headers.length;i++) headers[i]=headers[i].trim();
  var result=[];
  for(var r=1;r<lines.length;r++){
    var cols=splitLine(lines[r]),obj={};
    for(var c=0;c<headers.length;c++) obj[headers[c]]=(cols[c]||'').trim();
    if(Object.keys(obj).length>2) result.push(obj);
  }
  return result;
}

function detectWeeks(headers){
  var seen={};
  for(var i=0;i<headers.length;i++){
    var m=headers[i].match(/^W(\d+)\s/i);
    if(m) seen[parseInt(m[1])]=1;
  }
  return Object.keys(seen).map(Number).sort(function(a,b){return a-b;});
}

function uniqueVals(rows,key){
  var seen={},out=[];
  for(var i=0;i<rows.length;i++){
    var v=(rows[i][key]||'').trim();
    if(v&&!seen[v]){seen[v]=1;out.push(v);}
  }
  out.sort();
  return out;
}

function fillSel(id,vals,withLabel){
  var sel=document.getElementById(id);
  if(!sel) return;
  var prev=sel.value;
  sel.innerHTML='<option value="">All</option>';
  for(var i=0;i<vals.length;i++){
    var o=document.createElement('option');
    o.value=vals[i];
    o.textContent=withLabel?vals[i]+' \u2014 '+withLabel[vals[i]]:vals[i];
    sel.appendChild(o);
  }
  // restore previous selection if still present
  var opts=sel.options;
  for(var j=0;j<opts.length;j++){
    if(opts[j].value===prev){sel.value=prev;break;}
  }
}

function rebuildDropdowns(){
  var b=(document.getElementById('fBrand').value||'').trim();
  var d=(document.getElementById('fDist').value||'').trim();

  // Brand — always all rows
  fillSel('fBrand', uniqueVals(allRows,'brand'));

  // Distributor — scoped to brand
  var forDist=[];
  for(var i=0;i<allRows.length;i++){
    if(!b||(allRows[i]['brand']||'').trim()===b) forDist.push(allRows[i]);
  }
  fillSel('fDist', uniqueVals(forDist,'Distributor'));

  // Item — scoped to brand+dist
  var forItem=[];
  for(var i=0;i<forDist.length;i++){
    if(!d||(forDist[i]['Distributor']||'').trim()===d) forItem.push(forDist[i]);
  }
  var itemMap={},itemKeys=[];
  for(var i=0;i<forItem.length;i++){
    var k=(forItem[i]['SupplierItem']||'').trim();
    if(k&&!itemMap[k]){itemMap[k]=(forItem[i]['brand']+' '+forItem[i]['size']).trim();itemKeys.push(k);}
  }
  itemKeys.sort();
  fillSel('fItem',itemKeys,itemMap);
}

function onBrandChange(){ rebuildDropdowns(); render(); }
function onDistChange(){  rebuildDropdowns(); render(); }

function getFiltered(){
  var b=(document.getElementById('fBrand').value||'').trim();
  var d=(document.getElementById('fDist').value||'').trim();
  var it=(document.getElementById('fItem').value||'').trim();
  var out=[];
  for(var i=0;i<allRows.length;i++){
    var r=allRows[i];
    if(b&&(r['brand']||'').trim()!==b) continue;
    if(d&&(r['Distributor']||'').trim()!==d) continue;
    if(it&&(r['SupplierItem']||'').trim()!==it) continue;
    out.push(r);
  }
  return out;
}

function killChart(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

function render(){
  var rows=getFiltered();
  if(!rows.length) return;
  var u=ul(),wl=[],gc='rgba(0,0,0,0.05)',tc='#999';
  for(var i=0;i<weeks.length;i++) wl.push('W'+weeks[i]);

  var ohCE=0;
  for(var i=0;i<rows.length;i++) ohCE+=toVal(rows[i]['On-Hand Begin'],rows[i]['oz']);

  var ros=[],inb=[];
  for(var i=0;i<weeks.length;i++){
    var w=weeks[i],rs=0,ib=0;
    for(var j=0;j<rows.length;j++){
      rs+=toVal(rows[j]['W'+w+' ros'],rows[j]['oz']);
      ib+=toVal(rows[j]['W'+w+' inbound'],rows[j]['oz']);
    }
    ros.push(rs); inb.push(ib);
  }

  var invCur=ohCE,inv=[];
  for(var i=0;i<weeks.length;i++){
    invCur=Math.max(0,invCur+inb[i]-ros[i]);
    inv.push(invCur);
  }

  // OOS
  var oos=[];
  for(var ri=0;ri<rows.length;ri++){
    var r=rows[ri],runInv=toVal(r['On-Hand Begin'],r['oz']);
    for(var wi=0;wi<weeks.length;wi++){
      var w=weeks[wi];
      var wR=toVal(r['W'+w+' ros'],r['oz']),wI=toVal(r['W'+w+' inbound'],r['oz']);
      var avail=Math.max(0,runInv)+wI,shortage=wR-avail;
      runInv=avail-wR;
      if(shortage>0) oos.push({week:w,item:(r['SupplierItem']||'-').trim(),brand:(r['brand']||'-').trim(),dist:(r['Distributor']||'-').trim(),avail:avail,ros:wR,shortage:shortage,rawRow:r,rawOz:r['oz']});
    }
  }

  var oosWkMap={};
  for(var i=0;i<oos.length;i++) oosWkMap[oos[i].week]=1;
  var sortedWks=Object.keys(oosWkMap).map(Number).sort(function(a,b){return a-b;});
  var fw=sortedWks.length?sortedWks[0]:null;
  var fwIdx=fw!==null?weeks.indexOf(fw):-1;
  var firstWkInb=fwIdx>=0?inb[fwIdx]:0;
  var firstWkROS=fwIdx>=0?ros[fwIdx]:0;
  var curOOS=0;
  if(fw!==null) for(var i=0;i<oos.length;i++) if(oos[i].week===fw) curOOS+=oos[i].shortage;
  var oosPct=firstWkROS>0?(curOOS/firstWkROS)*100:0;

  // Metrics
  document.getElementById('metrics').style.display='grid';
  document.getElementById('metrics').innerHTML=
    '<div class="mcard"><div class="lbl">Distributor Inventory</div><div class="val">'+Math.round(ohCE)+' '+u+'</div><div class="sub">On-hand begin</div></div>'+
    '<div class="mcard"><div class="lbl">Total Distributor Shipments</div><div class="val">'+Math.round(firstWkInb)+' '+u+'</div><div class="sub">'+(fw!==null?'W'+fw:'No OOS week')+'</div></div>'+
    '<div class="mcard"><div class="lbl">OOS %</div><div class="val" style="color:#c0392b">'+(fw!==null?oosPct.toFixed(1)+'%':'N/A')+'</div><div class="sub">'+(fw!==null?'OOS \u00f7 ROS in W'+fw:'No OOS detected')+'</div></div>'+
    '<div class="mcard"><div class="lbl">Current Week OOS</div><div class="val" style="color:#c0392b">'+(fw!==null?fmt(curOOS)+' '+u:'None')+'</div><div class="sub">'+(fw!==null?'Total shortage W'+fw:'No OOS detected')+'</div></div>';

  document.getElementById('tROS').textContent='Forecasted Rate of Sale by Week ('+u+')';
  document.getElementById('tINB').textContent='Shipping to Dist by Week ('+u+')';
  document.getElementById('tINV').textContent='Projected Inventory Over Time ('+u+')';
  document.getElementById('lROS').textContent='ROS ('+u+'/wk)';
  document.getElementById('lINB').textContent='Shipping to Dist ('+u+')';

  var tickCb=function(v){return v+' '+u;};
  var rosVals=[];
  for(var i=0;i<ros.length;i++) rosVals.push(fnum(ros[i]));
  var rosMin=rosVals[0],rosMax=rosVals[0];
  for(var i=1;i<rosVals.length;i++){if(rosVals[i]<rosMin)rosMin=rosVals[i];if(rosVals[i]>rosMax)rosMax=rosVals[i];}
  var rosPad=(rosMax-rosMin)*1.5||rosMax*1.5||1;

  killChart('ros');
  charts['ros']=new Chart(document.getElementById('cROS'),{
    type:'line',data:{labels:wl,datasets:[{label:'ROS',data:rosVals,borderColor:'#2D3E50',backgroundColor:'rgba(45,62,80,0.07)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#2D3E50',tension:0.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:11}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11},callback:tickCb},grid:{color:gc},min:Math.max(0,Math.floor(rosMin-rosPad)),max:Math.ceil(rosMax+rosPad)}}}
  });

  var inbVals=[];
  for(var i=0;i<inb.length;i++) inbVals.push(fnum(inb[i]));
  killChart('inb');
  charts['inb']=new Chart(document.getElementById('cINB'),{
    type:'bar',data:{labels:wl,datasets:[{label:'Inbound',data:inbVals,backgroundColor:'#4AADA8',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:11}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11},callback:tickCb},grid:{color:gc},min:0}}}
  });

  var invVals=[fnum(ohCE)];
  for(var i=0;i<inv.length;i++) invVals.push(fnum(inv[i]));
  var inbVals2=[null];
  for(var i=0;i<inb.length;i++) inbVals2.push(fnum(inb[i]));
  var rosVals2=[null];
  for(var i=0;i<ros.length;i++) rosVals2.push(fnum(ros[i]));
  var invLabels=['Start'].concat(wl);
  killChart('inv');
  charts['inv']=new Chart(document.getElementById('cINV'),{
    type:'line',data:{labels:invLabels,datasets:[
      {label:'On-hand',data:invVals,borderColor:'#2D3E50',backgroundColor:'rgba(45,62,80,0.07)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#2D3E50',tension:0.3,fill:true},
      {label:'Inbound',data:inbVals2,borderColor:'#4AADA8',backgroundColor:'transparent',borderWidth:2,borderDash:[4,3],pointRadius:3,pointBackgroundColor:'#4AADA8',tension:0.3},
      {label:'ROS',data:rosVals2,borderColor:'#E67E22',backgroundColor:'transparent',borderWidth:2,borderDash:[4,3],pointRadius:3,pointBackgroundColor:'#E67E22',tension:0.3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:11}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11},callback:tickCb},grid:{color:gc},min:0}}}
  });

  // OOS table
  var wrap=document.getElementById('oosBody');
  if(!oos.length){wrap.innerHTML='<div class="nooos">No OOS events detected for the selected filters.</div>';return;}

  oos.sort(function(a,b){return a.week-b.week||b.shortage-a.shortage;});
  var byWeek={};
  for(var i=0;i<oos.length;i++){
    var e=oos[i];
    if(!byWeek[e.week]) byWeek[e.week]=[];
    if(byWeek[e.week].length<5) byWeek[e.week].push(e);
  }

  var html='<table><thead><tr>'+
    '<th class="l">Item</th><th class="l">Brand</th><th class="l">Distributor</th>'+
    '<th>Inventory ('+u+')</th><th>ROS ('+u+')</th><th>Shortage ('+u+')</th><th>Next Inbound Order</th>'+
    '</tr></thead><tbody>';

  for(var wi=0;wi<sortedWks.length;wi++){
    var w=sortedWks[wi],top5=byWeek[w],total=0;
    for(var i=0;i<oos.length;i++) if(oos[i].week===w) total+=oos[i].shortage;
    var hcls=wi===0?'whdr first':'whdr';
    html+='<tr class="'+hcls+'"><td class="l" colspan="7" style="padding:10px 12px">W'+w+' \u2014 Top '+top5.length+' OOS Events</td></tr>';
    for(var i=0;i<top5.length;i++){
      var e=top5[i],nextWk=null,nextQty=0;
      for(var k=weeks.indexOf(e.week);k<weeks.length;k++){
        var cw=weeks[k],cq=toVal(e.rawRow['W'+cw+' inbound'],e.rawOz);
        if(cq>0){nextWk=cw;nextQty=cq;break;}
      }
      var badge=nextWk!==null
        ?'<span style="background:#e6f4f1;color:#0F6E56;border:1px solid #1D9E75;border-radius:3px;padding:2px 8px;font-size:10px;font-weight:700">W'+nextWk+' \u2014 '+Math.round(nextQty)+' '+u+'</span>'
        :'<span style="background:#fdf0ee;color:#993C1D;border:1px solid #D85A30;border-radius:3px;padding:2px 8px;font-size:10px;font-weight:700">None</span>';
      html+='<tr><td class="l">'+e.item+'</td><td class="l">'+e.brand+'</td><td class="l">'+e.dist+'</td>'+
        '<td>'+fmt(e.avail)+' '+u+'</td><td>'+fmt(e.ros)+' '+u+'</td>'+
        '<td class="neg">'+fmt(e.shortage)+' '+u+'</td><td>'+badge+'</td></tr>';
    }
    html+='<tr style="background:#f7fdfc;border-top:1.5px solid #4AADA8">'+
      '<td class="l" colspan="3" style="font-weight:700;color:#2D3E50;font-size:11px;text-transform:uppercase;letter-spacing:0.04em">Total</td>'+
      '<td colspan="3"></td><td style="font-weight:700;color:#c0392b">'+fmt(total)+' '+u+'</td></tr>';
  }
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

document.getElementById('csvIn').onchange=function(e){
  var file=e.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    allRows=parseCSV(ev.target.result);
    if(!allRows.length){document.getElementById('fileInfo').textContent='Could not parse CSV.';return;}
    weeks=detectWeeks(Object.keys(allRows[0]));
    if(!weeks.length){document.getElementById('fileInfo').textContent='No weekly columns found.';return;}
    document.getElementById('fileInfo').textContent='Loaded '+allRows.length+' rows \u00b7 W'+weeks[0]+'\u2013W'+weeks[weeks.length-1];
    rebuildDropdowns();
    document.getElementById('controls').style.display='block';
    document.getElementById('metrics').style.display='grid';
    document.getElementById('chartsArea').style.display='block';
    render();
  };
  reader.readAsText(file);
};
</script>
</body>
</html>
